<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Respawns dos MVPs</title>
</head>
<body>
    <h1>Calculadora de Respawn de MVPs</h1>
    <div id="detalhe">
        <div class="clock-container">
            <div class="clock-item">
                <span class="clock-label">Horário Local</span>
                <span id="relogio-digital"></span>
            </div>
            <div class="clock-item">
                <span class="clock-label">Servidor (GMT+0)</span>
                <span id="relogio-server"></span>
            </div>
        </div>
    </div>
    <form id="respawnForm">
        <div class="form-group">
            <div class="input-container">
                <label for="horaMorte">Horário da morte:</label>
                <input type="datetime-local" id="horaMorte" name="horaMorte" required>
                
                <div class="timezone-toggle">
                    <label class="timezone-option">
                        <input type="radio" name="timezone" value="local" checked>
                        <span><i class="fas fa-home"></i> Local</span>
                    </label>
                    <label class="timezone-option">
                        <input type="radio" name="timezone" value="server">
                        <span><i class="fas fa-globe"></i> Servidor (GMT+0)</span>
                    </label>
                </div>
            </div>
            <div class="input-container">
                <label for="monstro">Monstro:</label>
                <select id="monstro" name="monstro">
                    <optgroup label="MVPs">
                        <option value="ifrit">Ifrit</option>
                        <option value="valk">Valkyrie Randgris</option>
                        <option value="corrupted">Corrupted Soul</option>
                        <option value="wsm">WSM</option>
                        <option value="amdarais">Amdarais</option>
                        <option value="thanatos">Thanatos</option>
                    </optgroup>
                    <optgroup label="Miniboss">
                        <option value="valkzinha1">Valkzinha (odin_tem02)</option>
                        <option value="valkzinha2">Valkzinha (odin_tem03)</option>
                        <option value="valkzinha3">Valkzinha (odin_tem03)</option>
                        <option value="angeling1">Angeling (pay_fild04)</option>
                        <option value="angeling2">Angeling (yuno_fild03)</option>
                        <option value="angeling3">Angeling (xmas_dun01)</option>
                        <option value="deviling1">Deviling (pay_fild04)</option>
                        <option value="deviling2">Deviling (yuno_fild03)</option>
                        <option value="ghostring1">Ghostring (pay_fild04)</option>
                        <option value="ghostring2">Ghostring (prt_maze03)</option>
                        <option value="ghostring3">Ghostring (treasure02)</option>
                    </optgroup>
                </select>
            </div>
        </div>
        <button type="submit">Calcular Respawn</button>
    </form>
    <h2 id="resultado"></h2>
    
    <div id="wrapper-categorias">
        <h3 class="titulo-categoria">MVPs</h3>
        <div id="resultado-mvps" class="resultado-grid"></div>
        
        <h3 class="titulo-categoria">Mini Boss</h3>
        <div id="resultado-miniboss" class="resultado-grid"></div>
    </div>

    <script src="script.js"></script>

    <footer class="rodape">
        <p>Desenvolvido por <strong>André Luís</strong> para organizar as caçadas de MVP e Miniboss</p>
    </footer>
</body>
</html>
