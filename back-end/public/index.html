<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Respawns dos MVPs/Miniboss (uaRO)</title>
</head>
<body>
    <h1>Calculadora de Respawn dos MVPs/Miniboss (uaRO)</h1>
    <div id="detalhe">
        <div class="clock-container">
            <div class="clock-item">
                <span class="clock-label">Horário Local</span>
                <span id="relogio-digital"></span>
            </div>
            <div class="clock-item">
                <span class="clock-label">Servidor (GMT+0)</span>
                <span id="relogio-server"></span>
            </div>
        </div>
    </div>
    <form id="respawnForm">
        <div class="form-group">
            <div class="input-container">
                <label for="horaMorte">Horário da morte:</label>
                <input type="datetime-local" id="horaMorte" name="horaMorte" required>
                
                <div class="timezone-toggle">
                    <label class="timezone-option">
                        <input type="radio" name="timezone" value="local" checked>
                        <span><i class="fas fa-home"></i> Local</span>
                    </label>
                    <label class="timezone-option">
                        <input type="radio" name="timezone" value="server">
                        <span><i class="fas fa-globe"></i> Servidor (GMT+0)</span>
                    </label>
                </div>
            </div>
            <div class="input-container">
                <label for="monstro">Monstro:</label>
                <select id="monstro" name="monstro">
                    <optgroup label="MVPs Antigos (Custom)">
                        <option value="ifrit">Ifrit</option>
                        <option value="valk">Valkyrie Randgris</option>
                        <option value="corrupted">Corrupted Soul</option>
                        <option value="wsm">WSM</option>
                        <option value="amdarais">Amdarais</option>
                        <option value="thanatos">Thanatos</option>
                    </optgroup>
                    <optgroup label="MVPs de Campo (Clássicos)">
                        <option value="amonra">Amon Ra</option>
                        <option value="atroce1">Atroce (ra_fild02)</option>
                        <option value="atroce2">Atroce (ra_fild03)</option>
                        <option value="atroce3">Atroce (ra_fild04)</option>
                        <option value="atroce4">Atroce (ve_fild01)</option>
                        <option value="atroce5">Atroce (ve_fild02)</option>
                        <option value="baphomet">Baphomet</option>
                        <option value="darklord">Dark Lord</option>
                        <option value="eddga">Eddga</option>
                        <option value="hatii">Hatii</option>
                        <option value="maya">Maya</option>
                        <option value="mistress">Mistress</option>
                        <option value="orchero">Orc Hero</option>
                        <option value="orclord">Orc Lord</option>
                        <option value="phreeoni">Phreeoni</option>
                    </optgroup>
                    <optgroup label="MVPs de Caverna/Instância">
                        <option value="whitelady">White Lady</option>
                        <option value="beelzebub">Beelzebub</option>
                        <option value="boitata">Boitata</option>
                        <option value="detardeurus">Detardeurus</option>
                        <option value="doppelganger">Doppelganger</option>
                        <option value="dracula">Dracula</option>
                        <option value="drake">Drake</option>
                        <option value="evilsnakelord">Evil Snake Lord</option>
                        <option value="fallenbishop">Fallen Bishop</option>
                        <option value="gloomundernight">Gloom Under Night</option>
                        <option value="gtb">Golden Thief Bug</option>
                        <option value="gopinich">Gopinich</option>
                        <option value="incantation">Incantation Samurai</option>
                        <option value="kiel">Kiel D-01</option>
                        <option value="stormyknight">Stormy Knight</option>
                        <option value="ladytanee">Lady Tanee</option>
                        <option value="lordofdeath">Lord of Death</option>
                        <option value="moonlight">Moonlight Flower</option>
                        <option value="osiris">Osiris</option>
                        <option value="pharaoh">Pharaoh</option>
                        <option value="rsx">RSX-0806</option>
                        <option value="taogunka">Tao Gunka</option>
                        <option value="turtlegeneral">Turtle General</option>
                        <option value="vesper">Vesper</option>
                    </optgroup>
                    <optgroup label="Laboratório de Somatologia">
                        <option value="eremes">Assassin Cross Eremes</option>
                        <option value="margaretha">High Priest Margaretha</option>
                        <option value="kathryne">High Wizard Kathryne</option>
                        <option value="seyren">Lord Knight Seyren</option>
                        <option value="cecil">Sniper Cecil</option>
                        <option value="howard">Whitesmith Howard</option>
                        <option value="cenia">Egnigem Cenia</option>
                    </optgroup>
                    <optgroup label="Mini Boss">
                        <option value="valkzinha1">Valkzinha (odin_tem02)</option>
                        <option value="valkzinha2">Valkzinha (odin_tem03)</option>
                        <option value="valkzinha3">Valkzinha (odin_tem03)</option>
                        <option value="angeling1">Angeling (pay_fild04)</option>
                        <option value="angeling2">Angeling (yuno_fild03)</option>
                        <option value="angeling3">Angeling (xmas_dun01)</option>
                        <option value="deviling1">Deviling (pay_fild04)</option>
                        <option value="deviling2">Deviling (yuno_fild03)</option>
                        <option value="ghostring1">Ghostring (pay_fild04)</option>
                        <option value="ghostring2">Ghostring (prt_maze03)</option>
                        <option value="ghostring3">Ghostring (treasure02)</option>
                        <option value="gryphon1">Gryphon (cmd_fild08)</option>
                        <option value="gryphon2">Gryphon (ra_fild01) - 1</option>
                        <option value="gryphon3">Gryphon (ra_fild01) - 2</option>
                        <option value="gryphon4">Gryphon (ra_fild01) - 3</option>
                        <option value="gryphon5">Gryphon (um_fild03)</option>
                        <option value="mayapurple">Maya Purple</option>
                    </optgroup>
                </select>
            </div>
        </div>
        <button type="submit">Calcular Respawn</button>
    </form>
    <h2 id="resultado"></h2>
    
    <div id="wrapper-categorias">
        <h3 class="titulo-categoria">MVPs</h3>
        <div id="resultado-mvps" class="resultado-grid"></div>
        
        <h3 class="titulo-categoria">Mini Boss</h3>
        <div id="resultado-miniboss" class="resultado-grid"></div>
    </div>

    <script src="script.js"></script>

    <footer class="rodape">
        <p>Desenvolvido por <strong>André Luís</strong> para organizar as caçadas de MVP e Miniboss</p>
    </footer>
</body>
</html>
